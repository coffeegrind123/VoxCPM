services:
  voxcpm:
    build: .
    image: voxcpm:latest
    container_name: voxcpm
    ports:
      - "8808:8808"
    volumes:
      - voxcpm_cache:/app/.cache
      - ./voices:/app/voices:ro
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 12G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - PYTHONUNBUFFERED=1
      - HF_HUB_DISABLE_PROGRESS_BARS=0
      - TQDM_MININTERVAL=0.5
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN:-}
    stdin_open: true
    tty: true

volumes:
  voxcpm_cache:
